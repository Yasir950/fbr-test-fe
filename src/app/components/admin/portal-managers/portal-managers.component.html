<ng-container *ngIf='loading'>
  <app-spinner></app-spinner>
  <h4 class='text-center text-primary my-3'>- LOADING -</h4>
  <div class='d-flex justify-content-center align-items-center'>
    <div class='spinner-border text-primary' role='status' style='width: 3rem; height: 3rem;'>
      <span class='visually-hidden'>Loading...</span>
    </div>
  </div>
</ng-container>
<ng-container *ngIf='!loading'>
  <div class='card'>
    <div class='card-header'>
      <div class='row align-items-center'>
        <div class='col-md-6'>
          <h4 class='card-title mb-0'>Portal Managers</h4>
        </div>
        <div class='col-md-6'>
          <!-- Search Input -->
          <div class='input-group'>
            <span class='input-group-text'><i class='ti ti-search'></i></span>
            <input (input)='filterManagers()' [(ngModel)]='searchText' class='form-control' placeholder='Search by first or last name...' type='text'>
            <button (click)='addNewManager()' class='btn btn-primary mx-2 px-5'>+ Add Manager</button>
          </div>
        </div>
      </div>
    </div>
    <div class='card-body'>
      <div class='table-responsive'>
        <table class='table table-hover mb-0'>
          <thead>
          <tr>
            <th class='fw-bolder text-primary'>Username</th>
            <th class='fw-bolder text-primary'>Full Name</th>
            <th class='fw-bolder text-primary'>Cell Number</th>
            <th class='text-center fw-bolder text-primary'>Admin Type</th>
            <th class='text-end fw-bolder text-danger'>Actions</th>
          </tr>
          </thead>
          <tbody>
          <tr *ngFor='let manager of filteredManagers'>
            <td><strong>{{ manager.username }}</strong></td>
            <td>{{ manager.firstName }} {{ manager.lastName }}</td>
            <td>{{ manager.cellNumber1 }}</td>
            <td class='text-center'>
              <span [ngClass]='getBadgeClass(manager.adminType)' class='badge w-50 capitalize' style='font-size: 12px;'>
                {{ manager.adminType.toString().replace("_", " ") }}
              </span>
            </td>
            <td class='text-end'>
              <button (click)='viewManager(manager.id)' class='btn btn-sm btn-outline-primary me-2' title='View Details'>
                <i class='ti ti-eye'></i> View
              </button>
              <button (click)='deleteManager(manager.id, manager.username)' *ngIf='manager.deleteable' class='btn btn-sm btn-outline-danger' title='Delete Manager'>
                <i class='ti ti-trash'></i> Delete
              </button>
            </td>
          </tr>
          <!-- No Results Message -->
          <tr *ngIf='filteredManagers.length === 0'>
            <td class='text-center' colspan='5'>
              <div class='alert alert-warning mb-0'>
                No managers found matching your search criteria.
              </div>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</ng-container>
