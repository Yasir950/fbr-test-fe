<div class="auth-main">
  <div class="auth-wrapper v3">
    <div class="auth-form">
      <div class="card">
        <img alt="logo" class="admin-logo" src="assets/images/fintel_logo.jpg" />
        <h3 class="text-center text-primary py-3">Reset Password</h3>

        <div class="card-body pt-2">

          <!-- Checking token -->
          <div *ngIf="tokenValid === null" class="text-center py-3">
            <span class="spinner-border text-primary"></span>
            <p class="text-muted mt-2">Validating your reset link...</p>
          </div>

          <!-- Invalid / expired token -->
          <div *ngIf="tokenValid === false">
            <div class="alert alert-danger">{{ error }}</div>
            <p class="text-center mt-3">
              <a [routerLink]="['/forgot-password']" class="link-primary">Request a new reset link</a>
            </p>
          </div>

          <!-- Valid token, reset form -->
          <ng-container *ngIf="tokenValid === true && !success">
            <form (ngSubmit)="onSubmit()" [formGroup]="form">
              <div class="form-group mb-3 position-relative">
                <label class="form-label fw-bolder text-primary" for="newPassword"><i class="ti ti-lock"></i> New Password</label>
                <input [type]="hidePassword ? 'password' : 'text'" [ngClass]="{'is-invalid': submitted && f['newPassword'].errors}" class="form-control pe-5" formControlName="newPassword" id="newPassword" />
                <span class="password-toggle" (click)="togglePassword()">
                  <i class="ti" [ngClass]="hidePassword ? 'ti-eye' : 'ti-eye-off'"></i>
                </span>
                <div *ngIf="submitted && f['newPassword'].errors" class="invalid-feedback d-block">Password must be at least 8 characters.</div>
              </div>

              <div class="form-group mb-3">
                <label class="form-label fw-bolder text-primary" for="confirmPassword"><i class="ti ti-lock"></i> Confirm New Password</label>
                <input [type]="hidePassword ? 'password' : 'text'" [ngClass]="{'is-invalid': submitted && (f['confirmPassword'].errors || form.errors?.['passwordMismatch'])}" class="form-control" formControlName="confirmPassword" id="confirmPassword" />
                <div *ngIf="submitted && form.errors?.['passwordMismatch']" class="invalid-feedback d-block">Passwords do not match.</div>
              </div>

              <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

              <div class="d-grid mt-4">
                <button [disabled]="loading" [ngClass]="loading ? 'btn-secondary' : 'btn-primary'" class="btn" type="submit">
                  <span *ngIf="!loading">Reset Password</span>
                  <span *ngIf="loading"><span class="spinner-border spinner-border-sm me-2"></span>Resetting...</span>
                </button>
              </div>
            </form>
          </ng-container>

          <!-- Success -->
          <div *ngIf="success" class="alert alert-success text-center">
            <i class="ti ti-circle-check me-1"></i>
            Your password has been reset successfully. Redirecting you to sign in...
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
